<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/><link rel="icon" type="image/png" href="brand_assets/favicon.png"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title id="page-title">How We Operate — Imberion</title>
  <meta name="description" content="Principles that shape how Imberion builds, decides, and executes."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#1b2a3b;--navy-80:rgba(27,42,59,.8);--navy-40:rgba(27,42,59,.4);
      --navy-12:rgba(27,42,59,.12);--navy-06:rgba(27,42,59,.06);
      --paper:#f6f4f0;--paper-alt:#edeae4;--white:#fff;
      --signal:#1b4332;--signal-lt:#d8ede1;--slate:#64748b;
      --max:1140px;--r:4px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--navy);font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased}
    img{display:block;max-width:100%} a{color:inherit;text-decoration:none} ul{list-style:none}
    .container{max-width:var(--max);margin:0 auto;padding:0 36px}
    .section{padding:96px 0}
    .section--dark{background:var(--navy);color:var(--white)}
    .section--tint{background:var(--paper-alt)}
    h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;line-height:1.12;font-weight:400}
    h2{font-size:clamp(2.1rem,4vw,3.2rem)}
    .eyebrow{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--signal);margin-bottom:14px}
    .section--dark .eyebrow{color:rgba(255,255,255,.55)}
    .lead{font-size:clamp(1.05rem,1.7vw,1.2rem);color:var(--navy-80);max-width:620px;line-height:1.7}
    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--navy);border-bottom:1px solid rgba(255,255,255,.08);padding:0 36px}
    .nav-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:68px}
    .nav-logo img{height:36px;width:auto}
    .nav-links{display:flex;gap:28px;align-items:center}
    .nav-links a:not(.btn):not(.lang-btn){color:rgba(255,255,255,.65);font-size:14px;font-weight:500;transition:color .2s}
    .nav-links a:not(.btn):not(.lang-btn):hover{color:#fff}
    .nav-links a.active-page{color:#fff}
    .nav-right{display:flex;gap:14px;align-items:center}
    .lang-toggle{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:var(--r);padding:3px}
    .lang-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:2px;cursor:pointer;color:rgba(255,255,255,.4);transition:all .18s;border:none;background:transparent}
    .lang-btn.active{background:rgba(255,255,255,.15);color:#fff}
    .lang-btn:hover:not(.active){color:rgba(255,255,255,.7)}
    .btn{display:inline-flex;align-items:center;padding:10px 22px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
    .btn-primary{background:var(--white);color:var(--navy)}
    .btn-primary:hover{background:var(--paper)}
    /* PAGE HERO */
    .page-hero{background:var(--navy);padding:140px 36px 88px;position:relative;overflow:hidden}
    .page-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 25% 60%,rgba(100,116,139,.18) 0%,transparent 60%);pointer-events:none}
    .page-hero-content{max-width:var(--max);margin:0 auto;position:relative;z-index:1}
    .page-hero .back{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,.45);font-size:13px;font-weight:500;margin-bottom:48px;transition:color .2s}
    .page-hero .back:hover{color:#fff}
    .page-hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,7vw,5.5rem);font-weight:300;color:#fff;line-height:1.05;max-width:680px;letter-spacing:-.01em}
    .page-hero .sub{margin-top:28px;max-width:540px;font-size:clamp(1rem,1.5vw,1.15rem);color:rgba(255,255,255,.55);line-height:1.7}
    /* PRINCIPLES GRID */
    .principles-section{padding:96px 0;background:var(--paper)}
    .principles-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-top:64px;border-top:1px solid var(--navy-12)}
    .principle-item{padding:36px 40px 36px 0;border-bottom:1px solid var(--navy-12)}
    .principle-item:nth-child(even){padding-left:40px;padding-right:0;border-left:1px solid var(--navy-12)}
    .principle-item h4{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em;color:var(--navy);margin-bottom:8px}
    .principle-item p{font-size:15px;color:var(--navy-80);line-height:1.65;max-width:420px}
    /* PRACTICAL SECTION */
    .practical-section{padding:88px 0;background:var(--paper-alt)}
    .practical-section h2{margin-bottom:48px;max-width:560px}
    .practical-list{list-style:none;display:flex;flex-direction:column;gap:0;max-width:720px}
    .practical-list li{font-size:clamp(1rem,1.4vw,1.1rem);color:var(--navy-80);line-height:1.7;padding:22px 0;border-bottom:1px solid var(--navy-12);display:flex;gap:20px;align-items:baseline}
    .practical-list li::before{content:'—';color:var(--navy-12);flex-shrink:0;font-weight:300}
    /* FOOTER */
    footer{background:var(--navy);border-top:1px solid rgba(255,255,255,.08);padding:48px 0 36px}
    .footer-inner{display:flex;justify-content:space-between;align-items:flex-start;gap:40px;flex-wrap:wrap}
    #footer-links a{font-size:13px;color:rgba(255,255,255,.4);transition:color .2s}
    #footer-links a:hover{color:rgba(255,255,255,.85)}
    /* RESPONSIVE */
    @media(max-width:960px){
      .principles-grid{grid-template-columns:1fr}
      .principle-item:nth-child(even){padding-left:0;border-left:none}
    }
    @media(max-width:600px){
      .container{padding:0 20px} nav{padding:0 20px} .nav-links{display:none}
      .page-hero{padding:120px 20px 64px}
      .principles-section{padding:72px 0}
      .principles-section .container{padding:0 20px}
      .practical-section{padding:64px 0}
      .practical-section .container{padding:0 20px}
      .principle-item{padding:28px 0}
    }
  </style>

function setLang(lang) {
  const t = T[lang] || T['en'];
  document.getElementById('html-root').setAttribute('lang', t.lang);
  document.getElementById('page-title').textContent = t.page_title;

  const fields = {
    'hero-back': 'hero_back',
    'hero-h1': 'hero_h1',
    'hero-sub': 'hero_sub',
    'principles-eyebrow': 'principles_eyebrow',
    'practical-h2': 'practical_h2',
    'footer-copy': 'footer_copy',
    'nav-how': 'nav_how',
    'nav-who': 'nav_who',
    'nav-dist': 'nav_dist',
    'nav-operate': 'nav_operate',
    'nav-cta': 'nav_cta'
  };
  Object.entries(fields).forEach(([id, key]) => {
    const el = document.getElementById(id);
    if(el && t[key] !== undefined) el.textContent = t[key];
  });

  const pg = document.getElementById('principles-grid');
  if(pg && t.principles)
    pg.innerHTML = t.principles.map(p =>
      `<div class="principle-item"><h4>${p[0]}</h4><p>${p[1]}</p></div>`
    ).join('');

  const pl = document.getElementById('practical-list');
  if(pl && t.practical)
    pl.innerHTML = t.practical.map(item =>
      `<li>${item}</li>`
    ).join('');

  const fl = document.getElementById('footer-links');
  if(fl && t.footer_links)
    fl.innerHTML = t.footer_links.map(l => `<a href="${l[1]}">${l[0]}</a>`).join('');

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('data-lang') === lang)
  );
}

function detectLang() {
  return ['en','es','pt'].includes((navigator.language||'en').slice(0,2))
    ? (navigator.language||'en').slice(0,2)
    : 'en';
}

setLang(detectLang());

document.querySelectorAll('.lang-btn').forEach(b =>
  b.addEventListener('click', () => setLang(b.getAttribute('data-lang')))
);
